name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Build and Test
        run: |
          dotnet restore GeometryShape/GeometryShape.sln
          dotnet build GeometryShape/GeometryShape.sln
          dotnet test GeometryShape/GeometryShape.sln